name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install trendspy

      - name: Run unit tests (no network)
        run: pytest tests/ -m "not network" -v --tb=short

      - name: Import check (smoke test)
        run: |
          python -c "from engine.signal_engine import compute_signals; print('signal_engine OK')"
          python -c "from engine.keyword_engine import compute_keyword_signals; print('keyword_engine OK')"
          python -c "from utils.config import FLOW_SCORE_WEIGHTS; print('config OK')"
